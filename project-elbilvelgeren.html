<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Elbilvelgeren — Andreas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="project.css">
</head>
<body>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="page">
    <div class="page-header">
      <a href="portfolio.html" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      </a>
      <h1 class="page-title">Elbilvelgeren</h1>
    </div>
    <div class="divider"></div>

    <div class="carousel">
      <div class="carousel-track" id="carouselTrack">
        <div class="carousel-slide"><img src="elbilvelgeren-1.jpg" alt="Elbilvelgeren skjermbilde 1"></div>
        <div class="carousel-slide"><img src="elbilvelgeren-2.jpg" alt="Elbilvelgeren skjermbilde 2"></div>
        <div class="carousel-slide"><img src="elbilvelgeren-3.jpg" alt="Elbilvelgeren skjermbilde 3"></div>
      </div>
      <div class="carousel-dots" id="carouselDots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <div class="sections">

      <div class="section">
        <button class="section-header" aria-expanded="false">
          <span>Oppsummering</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <div class="section-divider"></div>
        <div class="section-content">
          <p class="section-text">Utviklet en digital tjeneste som hjalp brukere å finne riktig elbil basert på behov, og oversatte komplekse tekniske egenskaper til en forståelig beslutningsprosess.</p>
        </div>
      </div>

      <div class="section">
        <button class="section-header" aria-expanded="false">
          <span>Problem</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <div class="section-divider"></div>
        <div class="section-content">
          <p class="section-text">Skriv inn problemet her.</p>
        </div>
      </div>

      <div class="section">
        <button class="section-header" aria-expanded="false">
          <span>Tilnærming</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <div class="section-divider"></div>
        <div class="section-content">
          <p class="section-text">Skriv inn tilnærming her.</p>
        </div>
      </div>

      <div class="section">
        <button class="section-header" aria-expanded="false">
          <span>Resultat</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <div class="section-divider"></div>
        <div class="section-content">
          <p class="section-text">Skriv inn resultat her.</p>
        </div>
      </div>

      <div class="section">
        <button class="section-header" aria-expanded="false">
          <span>Rolle</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <div class="section-divider"></div>
        <div class="section-content">
          <p class="section-text">Skriv inn rolle her.</p>
        </div>
      </div>

    </div>
  </div>
  <script src="project.js"></script>
  <script src="rain.js"></script>
</body>
</html>
